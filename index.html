<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RAB Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    .login-container h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #1e1b4b;
    }
    .login-container p {
      color: #64748b;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
      font-size: 0.9rem;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 45px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      outline: none;
      font-size: 0.95rem;
      transition: 0.2s;
    }
    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(95deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid #ef4444;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h2>RAB Pro</h2>
  <p>Sistem Pemantauan Anggaran Finansial</p>
  
  <div id="errorAlert" class="error-msg">Akses Ditolak</div>

  <form id="loginForm">
    <div class="form-group">
      <label>Alamat Email</label>
      <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="emailInput" placeholder="nama@genetek.co.id" required>
      </div>
    </div>
    <div class="form-group">
      <label>Kata Sandi</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-login" id="submitBtn">Masuk Aplikasi</button>
  </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // SALIN KREDENSIAL ASLI JANGAN SAMPAI ADA YANG KOSONG
  const firebaseConfig = {
      apiKey: "AIzaSyAQWeEYQNtocfIuKvKk8tbpKuIeW4CmZOI",
      authDomain: "rab-monitoring.firebaseapp.com",
      databaseURL: "https://rab-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rab-monitoring",
      storageBucket: "rab-monitoring.firebasestorage.app",
      messagingSenderId: "712435056277",
      appId: "1:712435056277:web:54db7d9ffd327bc3d9259c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const loginForm = document.getElementById('loginForm');
  const errorAlert = document.getElementById('errorAlert');
  const submitBtn = document.getElementById('submitBtn');

  function showError(message) {
    errorAlert.textContent = message;
    errorAlert.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Masuk Aplikasi';
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorAlert.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Memverifikasi...';

    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    // Mengubah titik (.) menjadi koma (,) agar sesuai standar penyimpanan string email di Realtime Database
    const sanitizedEmail = email.toLowerCase().replace(/\./g, ',');

    try {
      // 1. Coba Autentikasi ke Firebase Auth terlebih dahulu
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // PENGECEKAN BYPASS HAK ISTIMEWA ADMIN LANGSUNG BERDASARKAN UID / EMAIL
      if (user.uid === 'Wswgb5mhjRe1gnTF3X365bKXo7k1' || email.toLowerCase() === 'admin@genetek.co.id') {
        
        // Memastikan record user admin ini ada atau diperbarui di node /users/$uid
        await set(ref(db, `users/${user.uid}`), {
          username: email,
          role: "Administrator",
          status: "Active"
        });

        // Lolos verifikasi, langsung lempar ke dashboard utama
        window.location.href = 'index.html';
        return;
      }

      // 2. Untuk User Biasa, Cek apakah UID-nya sudah terdaftar di node `users`
      const userCheck = await get(ref(db, `users/${user.uid}`));
      
      if (userCheck.exists() && userCheck.val().status === 'Active') {
        window.location.href = 'index.html';
      } else {
        // 3. Jika UID belum ada di node `users`, cek apakah Email terdaftar di antrean list `user_emails`
        const emailCheck = await get(ref(db, `user_emails/${sanitizedEmail}`));
        
        if (emailCheck.exists()) {
          // Ambil role yang sudah ditentukan oleh admin sebelumnya dari antrean email
          const assignedRole = emailCheck.val().role || "Project Manager";

          // Daftarkan UID baru ini secara otomatis ke dalam node `users`
          await set(ref(db, `users/${user.uid}`), {
            username: email,
            role: assignedRole,
            status: "Active"
          });

          window.location.href = 'index.html';
        } else {
          // Jika tidak lolos semua pengecekan di atas
          showError("Akses Ditolak: Akun Anda belum terdaftar di database otorisasi.");
          await auth.signOut();
        }
      }

    } catch (error) {
      console.error(error);
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        showError("Email atau Password yang Anda masukkan salah.");
      } else {
        showError("Terjadi kesalahan sistem: " + error.message);
      }
    }
  });
</script>

</body>
</html>
